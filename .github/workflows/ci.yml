name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run test suite (build + engine + kata sim + DOM smoke)
        run: npm test

      - name: Verify dist/git-dojo.html is up to date with src/
        run: |
          git diff --quiet -- dist/git-dojo.html || {
            echo "::error::dist/git-dojo.html is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- dist/git-dojo.html
            exit 1
          }
