name: 🐛 Bug report
description: Something in Git Dojo behaves incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! The more precisely you can
        describe the command sequence, the faster it can be reproduced.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
      placeholder: "After `git merge feature`, the graph showed… but I expected…"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact kata/challenge and the command sequence you ran.
      placeholder: |
        1. Kata: "Resolve a Conflict" (or: Sandbox → "Fork & Merge" speedrun)
        2. Ran: git checkout -b feature
        3. Ran: git merge feature
        4. …
      render: text
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where
      description: Which kata, speedrun challenge, or the free sandbox?
      placeholder: 'Kata 9 "Resolve a Conflict"'
    validations:
      required: false
  - type: dropdown
    id: how-opened
    attributes:
      label: How were you running it?
      options:
        - Live site (shaqa3.github.io/git-dojo)
        - Opened dist/git-dojo.html locally
        - Built from source (npm run build)
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: "Chrome 126 on macOS 15"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or extra context
      description: A screenshot of the commit graph or terminal output helps a lot.
    validations:
      required: false
